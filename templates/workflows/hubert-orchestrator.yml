# Hubert orchestrator workflow (template).
#
# Copy this file into .github/workflows/ in any repo you want
# Hubert to watch. On each trigger it:
#   1. Short-circuits if a hubert-stop label is set on any
#      open issue in this repo (kill switch).
#   2. Builds a snapshot of the repo's open issues and PRs.
#   3. Pipes the snapshot + the embedded orchestrator prompt
#      to claude --print to produce a structured action list.
#   4. Hands the action list to hubert-dispatch, which (for
#      the default gha target) triggers hubert-exec.yml via
#      `gh workflow run` for each dispatch-* action.
#
# Required secrets:
#   HUBERT_GH_TOKEN       — PAT with repo read + issue/PR/
#                           actions-write on this repo. Used
#                           by hubert-snap, the in-workflow
#                           `gh` CLI, and `gh workflow run`
#                           from hubert-dispatch.
#
# LLM provider keys (set at least one — whichever matches the
# model used by your orchestrator and any backend an action may
# route to). Each secret is passed through verbatim as an env
# var; empty/unset secrets are ignored. Different actions can
# route to different providers, so it's fine (and expected) to
# set several.
#   OPENROUTER_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY,
#   OPENAI_API_KEY, GROQ_API_KEY, DEEPSEEK_API_KEY,
#   CEREBRAS_API_KEY, XAI_API_KEY, MISTRAL_API_KEY.
#
# Optional secrets (only when using target=k8s):
#   HUBERT_KUBECONFIG     — base64-encoded kubeconfig scoped
#                           to the `hubert` namespace service
#                           account. Required only when
#                           vars.HUBERT_TARGET is set to `k8s`.
#
# Repo variables (vars.*):
#   HUBERT_TARGET         — execution target: `gha` (default,
#                           triggers hubert-exec.yml) or `k8s`
#                           (applies a Kubernetes Job).
#   HUBERT_ORCH_AGENT     — CLI used for the orchestrator pass:
#                           opencode (default), claude, or gemini.
#   HUBERT_ORCH_MODEL     — model identifier for the orchestrator
#                           pass (default:
#                           openrouter/deepseek/deepseek-chat-v3.1:free).
#   HUBERT_IMAGE          — fully-qualified runner image ref
#                           (k8s target only).
#   HUBERT_NAMESPACE      — kubernetes namespace (k8s target
#                           only; default: hubert).

name: hubert-orchestrator

on:
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, unassigned, reopened]
  issue_comment:
    types: [created, edited]
  pull_request:
    types: [opened, edited, labeled, unlabeled, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  check_run:
    types: [completed]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: hubert-orchestrator-${{ github.repository }}
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Kill-switch check
        env:
          GH_TOKEN: ${{ secrets.HUBERT_GH_TOKEN }}
        run: |
          set -euo pipefail
          stopped=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --label hubert-stop \
            --state open \
            --limit 1 \
            --json number \
            --jq 'length')
          if [ "$stopped" != "0" ]; then
            echo "::notice::hubert-stop label present; exiting"
            exit 0
          fi

      - name: Secret-presence gate
        id: gate
        env:
          HAVE_ANY_LLM_KEY: ${{ (secrets.OPENROUTER_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '' || secrets.GEMINI_API_KEY != '' || secrets.OPENAI_API_KEY != '' || secrets.GROQ_API_KEY != '' || secrets.DEEPSEEK_API_KEY != '' || secrets.CEREBRAS_API_KEY != '' || secrets.XAI_API_KEY != '' || secrets.MISTRAL_API_KEY != '') }}
          HAVE_KUBECONFIG: ${{ secrets.HUBERT_KUBECONFIG != '' }}
          TARGET: ${{ vars.HUBERT_TARGET || 'gha' }}
        run: |
          set -euo pipefail
          missing=""
          [ "$HAVE_ANY_LLM_KEY" = "true" ] || missing="$missing <any-LLM-provider-key>"
          if [ "$TARGET" = "k8s" ] && [ "$HAVE_KUBECONFIG" != "true" ]; then
            missing="$missing HUBERT_KUBECONFIG"
          fi
          if [ -n "$missing" ]; then
            echo "::notice::Hubert orchestrator idle — missing:$missing"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - if: steps.gate.outputs.ready == 'true'
        name: Install Hubert binaries
        run: |
          set -euo pipefail
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-snap@latest
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-dispatch@latest
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-prompts@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - if: steps.gate.outputs.ready == 'true'
        name: Install orchestrator CLI
        env:
          AGENT: ${{ vars.HUBERT_ORCH_AGENT || 'opencode' }}
        run: |
          set -euo pipefail
          case "$AGENT" in
            opencode)
              npm install -g opencode-ai@latest
              opencode --version
              ;;
            claude)
              npm install -g @anthropic-ai/claude-code
              claude --version
              ;;
            gemini)
              npm install -g @google/gemini-cli
              gemini --version
              ;;
            *)
              echo "unknown HUBERT_ORCH_AGENT: $AGENT" >&2
              exit 1
              ;;
          esac

      - if: steps.gate.outputs.ready == 'true'
        name: Build snapshot
        env:
          GH_TOKEN: ${{ secrets.HUBERT_GH_TOKEN }}
        run: |
          hubert-snap -repo "${GITHUB_REPOSITORY}" > "${RUNNER_TEMP}/snapshot.json"
          wc -c "${RUNNER_TEMP}/snapshot.json"

      - if: steps.gate.outputs.ready == 'true'
        name: Run orchestrator pass
        env:
          AGENT: ${{ vars.HUBERT_ORCH_AGENT || 'opencode' }}
          MODEL: ${{ vars.HUBERT_ORCH_MODEL || 'openrouter/deepseek/deepseek-chat-v3.1:free' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
        run: |
          set -euo pipefail
          {
            hubert-prompts orchestrator
            printf '\n\n## Current GitHub state snapshot\n\n```json\n'
            cat "${RUNNER_TEMP}/snapshot.json"
            printf '\n```\n'
          } > "${RUNNER_TEMP}/input.txt"
          case "$AGENT" in
            opencode)
              opencode run --dangerously-skip-permissions -m "$MODEL" \
                < "${RUNNER_TEMP}/input.txt" > "${RUNNER_TEMP}/orchestrator-output.txt"
              ;;
            claude)
              claude --print --model "$MODEL" \
                < "${RUNNER_TEMP}/input.txt" > "${RUNNER_TEMP}/orchestrator-output.txt"
              ;;
            gemini)
              gemini -p - --yolo -m "$MODEL" \
                < "${RUNNER_TEMP}/input.txt" > "${RUNNER_TEMP}/orchestrator-output.txt"
              ;;
          esac

      - if: steps.gate.outputs.ready == 'true'
        name: Extract action list
        id: actions
        run: |
          set -euo pipefail
          awk '
            /^```hubert-actions$/ { inblock=1; next }
            /^```$/ && inblock { inblock=0; exit }
            inblock { print }
          ' "${RUNNER_TEMP}/orchestrator-output.txt" > "${RUNNER_TEMP}/actions.json"
          if [ ! -s "${RUNNER_TEMP}/actions.json" ]; then
            echo "::notice::no hubert-actions block in orchestrator output"
            exit 0
          fi
          echo "actions_file=${RUNNER_TEMP}/actions.json" >> "$GITHUB_OUTPUT"

      - name: Write kubeconfig
        if: ${{ steps.actions.outputs.actions_file != '' && steps.gate.outputs.target == 'k8s' }}
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.HUBERT_KUBECONFIG }}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"

      - name: Apply actions
        if: ${{ steps.actions.outputs.actions_file != '' }}
        env:
          GH_TOKEN: ${{ secrets.HUBERT_GH_TOKEN }}
        run: |
          set -euo pipefail
          hubert-dispatch \
            -repo "${GITHUB_REPOSITORY}" \
            -target "${{ steps.gate.outputs.target }}" \
            -namespace "${{ vars.HUBERT_NAMESPACE || 'hubert' }}" \
            -image "${{ vars.HUBERT_IMAGE }}" \
            -actions "${{ steps.actions.outputs.actions_file }}"
