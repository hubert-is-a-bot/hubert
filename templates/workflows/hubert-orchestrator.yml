# Hubert orchestrator workflow (template).
#
# Copy this file into .github/workflows/ in any repo you want
# Hubert to watch. On each trigger it:
#   1. Short-circuits if a hubert-stop label is set on any
#      open issue in this repo (kill switch).
#   2. Builds a snapshot of the repo's open issues and PRs.
#   3. Pipes the snapshot + the embedded orchestrator prompt
#      to claude --print to produce a structured action list.
#   4. Hands the action list to hubert-dispatch, which (for
#      the default gha target) triggers hubert-exec.yml via
#      `gh workflow run` for each dispatch-* action.
#
# Required secrets:
#   HUBERT_APP_ID         — numeric App ID of the GitHub App
#                           installed on this repo. Each
#                           orchestrator step mints a fresh
#                           ~1-hour installation token against
#                           this App via actions/create-github-
#                           app-token, so no long-lived PAT
#                           lives anywhere in this workflow.
#   HUBERT_APP_PRIVATE_KEY — the full contents of the App's
#                           downloaded `.pem` private key. Used
#                           only at token-mint time; never
#                           passed downstream.
#
# LLM provider keys:
#   OPENROUTER_API_KEY    — used by the orchestrator pass (which
#                           hits an OpenAI-compatible chat
#                           completion endpoint directly; default
#                           is OpenRouter). Required unless
#                           you override HUBERT_ORCH_API_BASE to
#                           point at a different provider.
#
# Any of these additional keys can be set and will be passed
# through to exec runs (hubert-exec.yml) verbatim. Different
# actions can route to different providers, so set whichever
# match the backends you expect actions to dispatch to:
#   ANTHROPIC_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY,
#   GROQ_API_KEY, DEEPSEEK_API_KEY, CEREBRAS_API_KEY,
#   XAI_API_KEY, MISTRAL_API_KEY.
#
# Optional secrets (only when using target=k8s):
#   HUBERT_KUBECONFIG     — base64-encoded kubeconfig scoped
#                           to the `hubert` namespace service
#                           account. Required only when
#                           vars.HUBERT_TARGET is set to `k8s`.
#
# Repo variables (vars.*):
#   HUBERT_TARGET         — execution target: `gha` (default,
#                           triggers hubert-exec.yml) or `k8s`
#                           (applies a Kubernetes Job).
#   HUBERT_ORCH_MODEL     — model identifier for the orchestrator
#                           pass (default: z-ai/glm-4.5-air:free,
#                           a free OpenRouter model).
#   HUBERT_ORCH_API_BASE  — OpenAI-compatible chat-completion
#                           base URL (default:
#                           https://openrouter.ai/api/v1). Point
#                           at any OpenAI-API-compatible provider.
#   HUBERT_IMAGE          — fully-qualified runner image ref
#                           (k8s target only).
#   HUBERT_NAMESPACE      — kubernetes namespace (k8s target
#                           only; default: hubert).

name: hubert-orchestrator

on:
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, unassigned, reopened]
  issue_comment:
    types: [created, edited]
  pull_request:
    types: [opened, edited, labeled, unlabeled, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  check_run:
    types: [completed]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  # The built-in GITHUB_TOKEN is not used by this workflow —
  # all GitHub-side side effects go through the minted App
  # installation token from the `Mint orchestrator App token`
  # step. Leaving GITHUB_TOKEN scoped to `contents: read` only.
  contents: read

concurrency:
  group: hubert-orchestrator-${{ github.repository }}
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Secret-presence gate
        id: gate
        env:
          HAVE_APP_ID: ${{ secrets.HUBERT_APP_ID != '' }}
          HAVE_APP_KEY: ${{ secrets.HUBERT_APP_PRIVATE_KEY != '' }}
          HAVE_OPENROUTER: ${{ secrets.OPENROUTER_API_KEY != '' }}
          HAVE_KUBECONFIG: ${{ secrets.HUBERT_KUBECONFIG != '' }}
          TARGET: ${{ vars.HUBERT_TARGET || 'gha' }}
        run: |
          set -euo pipefail
          missing=""
          [ "$HAVE_APP_ID" = "true" ]     || missing="$missing HUBERT_APP_ID"
          [ "$HAVE_APP_KEY" = "true" ]    || missing="$missing HUBERT_APP_PRIVATE_KEY"
          [ "$HAVE_OPENROUTER" = "true" ] || missing="$missing OPENROUTER_API_KEY"
          if [ "$TARGET" = "k8s" ] && [ "$HAVE_KUBECONFIG" != "true" ]; then
            missing="$missing HUBERT_KUBECONFIG"
          fi
          if [ -n "$missing" ]; then
            echo "::notice::Hubert orchestrator idle — missing:$missing"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.ready == 'true'
        name: Mint orchestrator App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HUBERT_APP_ID }}
          private-key: ${{ secrets.HUBERT_APP_PRIVATE_KEY }}
          # Orchestrator needs: issue/PR metadata + labels
          # (issues:write, pull-requests:write), dispatch
          # triggers on hubert-exec.yml (actions:write), and
          # commits+checks read for snapshot+routing
          # (contents:read, checks:read).
          permission-issues: write
          permission-pull-requests: write
          permission-actions: write
          permission-contents: read
          permission-checks: read

      - if: steps.gate.outputs.ready == 'true'
        name: Kill-switch check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          stopped=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --label hubert-stop \
            --state open \
            --limit 1 \
            --json number \
            --jq 'length')
          if [ "$stopped" != "0" ]; then
            echo "::notice::hubert-stop label present; exiting"
            exit 0
          fi

      - if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - if: steps.gate.outputs.ready == 'true'
        name: Install Hubert binaries
        run: |
          set -euo pipefail
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-snap@latest
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-dispatch@latest
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-prompts@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - if: steps.gate.outputs.ready == 'true'
        name: Build snapshot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          hubert-snap -repo "${GITHUB_REPOSITORY}" > "${RUNNER_TEMP}/snapshot.json"
          wc -c "${RUNNER_TEMP}/snapshot.json"

      - if: steps.gate.outputs.ready == 'true'
        name: Run orchestrator pass
        env:
          # Orchestrator uses a plain OpenAI-compatible chat
          # completion — no agentic tools. OpenRouter is the
          # default endpoint; point API_BASE / API_KEY at any
          # OpenAI-compatible provider to swap.
          MODEL: ${{ vars.HUBERT_ORCH_MODEL || 'z-ai/glm-4.5-air:free' }}
          API_BASE: ${{ vars.HUBERT_ORCH_API_BASE || 'https://openrouter.ai/api/v1' }}
          API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          {
            hubert-prompts orchestrator
            printf '\n\n## Current GitHub state snapshot\n\n```json\n'
            cat "${RUNNER_TEMP}/snapshot.json"
            printf '\n```\n'
          } > "${RUNNER_TEMP}/input.txt"
          jq -n \
            --arg model "$MODEL" \
            --rawfile prompt "${RUNNER_TEMP}/input.txt" \
            '{model: $model, messages: [{role: "user", content: $prompt}]}' \
            > "${RUNNER_TEMP}/req.json"
          curl -sfL "$API_BASE/chat/completions" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            --data @"${RUNNER_TEMP}/req.json" \
            > "${RUNNER_TEMP}/resp.json"
          jq -r '.choices[0].message.content' < "${RUNNER_TEMP}/resp.json" \
            > "${RUNNER_TEMP}/orchestrator-output.txt"
          echo "--- head of orchestrator output ---"
          head -40 "${RUNNER_TEMP}/orchestrator-output.txt" || true

      - if: steps.gate.outputs.ready == 'true'
        name: Extract action list
        id: actions
        run: |
          set -euo pipefail
          awk '
            /^```hubert-actions$/ { inblock=1; next }
            /^```$/ && inblock { inblock=0; exit }
            inblock { print }
          ' "${RUNNER_TEMP}/orchestrator-output.txt" > "${RUNNER_TEMP}/actions.json"
          if [ ! -s "${RUNNER_TEMP}/actions.json" ]; then
            echo "::notice::no hubert-actions block in orchestrator output"
            exit 0
          fi
          echo "actions_file=${RUNNER_TEMP}/actions.json" >> "$GITHUB_OUTPUT"

      - name: Write kubeconfig
        if: ${{ steps.actions.outputs.actions_file != '' && steps.gate.outputs.target == 'k8s' }}
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.HUBERT_KUBECONFIG }}" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"

      - name: Apply actions
        if: ${{ steps.actions.outputs.actions_file != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          hubert-dispatch \
            -repo "${GITHUB_REPOSITORY}" \
            -target "${{ steps.gate.outputs.target }}" \
            -namespace "${{ vars.HUBERT_NAMESPACE || 'hubert' }}" \
            -image "${{ vars.HUBERT_IMAGE }}" \
            -actions "${{ steps.actions.outputs.actions_file }}"
