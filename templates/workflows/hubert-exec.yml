# Hubert execution / reviewer workflow (template).
#
# Runs one hubert-runner invocation inside a GitHub Actions
# worker. Triggered by hubert-dispatch (running in the
# orchestrator workflow) via workflow_dispatch with per-run
# inputs. This is the [Now] alternative to dispatching a
# Kubernetes Job — it lets us prove the loop end-to-end
# without a cluster. The K8s path stays wired up in
# internal/dispatch for later.
#
# Required secrets (same as hubert-orchestrator.yml):
#   HUBERT_GH_TOKEN  — PAT used for clone, push, gh.
#
# LLM provider keys (set at least one — whichever matches the
# model used by actions that route here). Each secret is passed
# through verbatim as an env var; empty/unset secrets are
# ignored. Multiple providers can coexist, so set as many as
# you expect orchestrator actions to route to.
#   OPENROUTER_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY,
#   OPENAI_API_KEY, GROQ_API_KEY, DEEPSEEK_API_KEY,
#   CEREBRAS_API_KEY, XAI_API_KEY, MISTRAL_API_KEY.

name: hubert-exec

on:
  workflow_dispatch:
    inputs:
      role:
        description: "execution or reviewer"
        required: true
        default: execution
      run_id:
        description: "ULID identifying this run"
        required: true
      mode:
        description: "fresh or iterate (execution) / reviewer"
        required: true
        default: fresh
      iteration:
        description: "iteration counter (0 for fresh)"
        required: false
        default: "0"
      issue:
        description: "issue number (execution)"
        required: false
        default: "0"
      pr:
        description: "PR number (reviewer)"
        required: false
        default: "0"
      agent:
        description: "opencode, claude, or gemini"
        required: true
        default: opencode
      model:
        description: "model identifier for the chosen backend"
        required: false
        default: ""
      branch:
        description: "branch name for this run"
        required: false
        default: ""
      budget_usd:
        description: "hard cost cap for this run"
        required: false
        default: "0"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  # One exec per issue at a time. The runner's assignment-as-
  # lock guards against concurrent exec across ticks; the
  # concurrency group guards against rapid re-dispatch.
  group: hubert-exec-${{ github.repository }}-${{ inputs.issue }}${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  exec:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Hubert runner binary
        run: |
          set -euo pipefail
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-runner@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install agent CLI
        env:
          AGENT: ${{ inputs.agent }}
        run: |
          set -euo pipefail
          case "$AGENT" in
            opencode)
              npm install -g opencode-ai@latest
              opencode --version
              ;;
            claude)
              npm install -g @anthropic-ai/claude-code
              claude --version
              ;;
            gemini)
              npm install -g @google/gemini-cli
              gemini --version
              ;;
            *)
              echo "unknown agent: $AGENT" >&2
              exit 1
              ;;
          esac

      - name: Configure git identity
        run: |
          git config --global user.name  "hubert-is-a-bot"
          git config --global user.email "hubert-is-a-bot@users.noreply.github.com"

      - name: Run execution
        env:
          HUBERT_RUN_ID: ${{ inputs.run_id }}
          HUBERT_REPO: ${{ github.repository }}
          HUBERT_ROLE: ${{ inputs.role }}
          HUBERT_ISSUE: ${{ inputs.issue }}
          HUBERT_PR: ${{ inputs.pr }}
          HUBERT_MODE: ${{ inputs.mode }}
          HUBERT_ITERATION: ${{ inputs.iteration }}
          HUBERT_AGENT: ${{ inputs.agent }}
          HUBERT_MODEL: ${{ inputs.model }}
          HUBERT_BRANCH: ${{ inputs.branch }}
          HUBERT_BUDGET_USD: ${{ inputs.budget_usd }}
          HUBERT_GH_TOKEN: ${{ secrets.HUBERT_GH_TOKEN }}
          GH_TOKEN: ${{ secrets.HUBERT_GH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
        run: hubert-runner
