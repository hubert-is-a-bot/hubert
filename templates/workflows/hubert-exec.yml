# Hubert execution / reviewer workflow (template).
#
# Runs one hubert-runner invocation inside a GitHub Actions
# worker. Triggered by hubert-dispatch (running in the
# orchestrator workflow) via workflow_dispatch with per-run
# inputs. This is the [Now] alternative to dispatching a
# Kubernetes Job — it lets us prove the loop end-to-end
# without a cluster. The K8s path stays wired up in
# internal/dispatch for later.
#
# Required secrets (same as hubert-orchestrator.yml):
#   HUBERT_APP_ID         — numeric App ID of the GitHub App
#                           installed on this repo.
#   HUBERT_APP_PRIVATE_KEY — the full contents of the App's
#                           downloaded `.pem` private key.
#
# This workflow mints a role-scoped installation token at
# the start of every run:
#   role=execution → contents:write + pull-requests:write +
#                    issues:write (can open PR, push, comment)
#   role=reviewer  → contents:read + pull-requests:read +
#                    issues:write (can read + comment, but
#                    NOT approve/merge — that's enforced at the
#                    API layer, not by prompt discipline)
#
# After the reviewer's LLM run, a follow-up step reads its
# structured verdict comment and — using the workflow's own
# GITHUB_TOKEN (a different identity from the reviewer App
# installation) — performs the actual approve/merge or label
# flip. The LLM never holds merge capability.
#
# LLM provider keys (set at least one — whichever matches the
# model used by actions that route here). Each secret is passed
# through verbatim as an env var; empty/unset secrets are
# ignored. Multiple providers can coexist, so set as many as
# you expect orchestrator actions to route to.
#   OPENROUTER_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY,
#   OPENAI_API_KEY, GROQ_API_KEY, DEEPSEEK_API_KEY,
#   CEREBRAS_API_KEY, XAI_API_KEY, MISTRAL_API_KEY.

name: hubert-exec

on:
  workflow_dispatch:
    inputs:
      role:
        description: "execution or reviewer"
        required: true
        default: execution
      run_id:
        description: "ULID identifying this run"
        required: true
      mode:
        description: "fresh or iterate (execution) / reviewer"
        required: true
        default: fresh
      iteration:
        description: "iteration counter (0 for fresh)"
        required: false
        default: "0"
      issue:
        description: "issue number (execution)"
        required: false
        default: "0"
      pr:
        description: "PR number (reviewer)"
        required: false
        default: "0"
      agent:
        description: "opencode, claude, or gemini"
        required: true
        default: opencode
      model:
        description: "model identifier for the chosen backend"
        required: false
        default: ""
      branch:
        description: "branch name for this run"
        required: false
        default: ""
      budget_usd:
        description: "hard cost cap for this run"
        required: false
        default: "0"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  # One exec per issue at a time. The runner's assignment-as-
  # lock guards against concurrent exec across ticks; the
  # concurrency group guards against rapid re-dispatch.
  group: hubert-exec-${{ github.repository }}-${{ inputs.issue }}${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  exec:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mint role-scoped App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HUBERT_APP_ID }}
          private-key: ${{ secrets.HUBERT_APP_PRIVATE_KEY }}
          # Role-dependent permission narrowing. Reviewer gets
          # read-only on code + PRs so it physically cannot
          # approve or merge — the verdict-apply step below
          # (which uses GITHUB_TOKEN, a different identity)
          # performs those actions based on the reviewer's
          # structured verdict comment.
          permission-contents: ${{ inputs.role == 'reviewer' && 'read' || 'write' }}
          permission-pull-requests: ${{ inputs.role == 'reviewer' && 'read' || 'write' }}
          permission-issues: write

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Hubert runner binary
        run: |
          set -euo pipefail
          go install github.com/hubert-is-a-bot/hubert/cmd/hubert-runner@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install agent CLI
        env:
          AGENT: ${{ inputs.agent }}
        run: |
          set -euo pipefail
          case "$AGENT" in
            opencode)
              npm install -g opencode-ai@latest
              opencode --version
              ;;
            claude)
              npm install -g @anthropic-ai/claude-code
              claude --version
              ;;
            gemini)
              npm install -g @google/gemini-cli
              gemini --version
              ;;
            *)
              echo "unknown agent: $AGENT" >&2
              exit 1
              ;;
          esac

      - name: Configure git identity
        run: |
          git config --global user.name  "hubert-is-a-bot"
          git config --global user.email "hubert-is-a-bot@users.noreply.github.com"

      - name: Run execution
        env:
          HUBERT_RUN_ID: ${{ inputs.run_id }}
          HUBERT_REPO: ${{ github.repository }}
          HUBERT_ROLE: ${{ inputs.role }}
          HUBERT_ISSUE: ${{ inputs.issue }}
          HUBERT_PR: ${{ inputs.pr }}
          HUBERT_MODE: ${{ inputs.mode }}
          HUBERT_ITERATION: ${{ inputs.iteration }}
          HUBERT_AGENT: ${{ inputs.agent }}
          HUBERT_MODEL: ${{ inputs.model }}
          HUBERT_BRANCH: ${{ inputs.branch }}
          HUBERT_BUDGET_USD: ${{ inputs.budget_usd }}
          HUBERT_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
        run: hubert-runner

      # --- Reviewer-only follow-up: take the action. -------------
      # The reviewer LLM's token is scoped without pull-requests:
      # write, so it physically cannot approve or merge. It posts
      # a structured verdict comment starting with
      #   🤖 hubert-verdict <run_id> <kind>
      # …and exits. This step parses that comment and takes the
      # matching action using GITHUB_TOKEN (whose identity,
      # github-actions[bot], is *different* from the exec App's
      # installation identity — so same-author approval block
      # doesn't fire).
      - name: Apply reviewer verdict
        if: inputs.role == 'reviewer'
        env:
          GH_TOKEN: ${{ github.token }}
          HUBERT_PR: ${{ inputs.pr }}
          HUBERT_ISSUE: ${{ inputs.issue }}
          HUBERT_RUN_ID: ${{ inputs.run_id }}
          MERGE_STYLE: ${{ vars.HUBERT_MERGE_STYLE || 'squash' }}
        run: |
          set -euo pipefail
          body=$(gh pr view "$HUBERT_PR" --json comments \
            | jq -r --arg rid "$HUBERT_RUN_ID" \
              '[.comments[] | select(.body | startswith("🤖 hubert-verdict " + $rid))] | (last.body // "")')
          if [ -z "$body" ]; then
            echo "::warning::no verdict comment for run $HUBERT_RUN_ID on PR #$HUBERT_PR; leaving PR untouched"
            exit 0
          fi
          kind=$(printf '%s' "$body" | head -n1 | awk '{print $4}')
          echo "reviewer verdict: $kind"
          case "$kind" in
            approve)
              gh pr review "$HUBERT_PR" --approve \
                --body "Approved per reviewer verdict (run $HUBERT_RUN_ID)."
              gh pr merge "$HUBERT_PR" --"$MERGE_STYLE" --delete-branch
              if [ "$HUBERT_ISSUE" != "0" ]; then
                gh issue edit "$HUBERT_ISSUE" --remove-label hubert-review || true
              fi
              ;;
            request-changes)
              if [ "$HUBERT_ISSUE" != "0" ]; then
                gh issue edit "$HUBERT_ISSUE" --remove-label hubert-review || true
                gh issue edit "$HUBERT_ISSUE" --add-label hubert-changes-requested
              fi
              ;;
            escalate)
              if [ "$HUBERT_ISSUE" != "0" ]; then
                gh issue edit "$HUBERT_ISSUE" --remove-label hubert-review || true
                gh issue edit "$HUBERT_ISSUE" --add-label hubert-stuck
              fi
              ;;
            *)
              echo "::warning::unrecognized verdict kind '$kind' on PR #$HUBERT_PR; leaving as-is"
              exit 0
              ;;
          esac
